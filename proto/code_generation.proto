syntax = "proto3";

package com.adcage.acaicodefree;

import "common.proto";

option java_multiple_files = true;
option java_package = "com.adcage.acaicodefree.grpc.codegen";

service CodeGenerationService {
  rpc StreamGenerate(CodeGenerationRequest) returns (stream CodeGenerationEvent);
  rpc StreamModify(CodeModificationRequest) returns (stream CodeGenerationEvent);
  rpc ValidatePrompt(ValidatePromptRequest) returns (ValidatePromptResponse);
  rpc EnhancePrompt(EnhancePromptRequest) returns (EnhancePromptResponse);
  rpc GenerateAppTitle(GenerateAppTitleRequest) returns (GenerateTitleResponse);
  rpc GenerateSessionTitle(GenerateSessionTitleRequest) returns (GenerateTitleResponse);
}

message CodeGenerationRequest {
  string agent_run_id = 1;
  int64 app_id = 2;
  int64 session_id = 3;
  int64 user_id = 4;
  string prompt = 5;
  CodeGenType code_gen_type = 6;
  string workspace_path = 7;
  int64 model_config_id = 8;
  int32 config_version = 9;
  string loop_state_json = 10;
  bool is_test = 11;
  GenerationMode generation_mode = 12;
  repeated AttachmentInfo attachments = 13;
  string runtime_options_json = 14;  // JSON: {"enabled_tools": ["Read","Write","Bash",...]}
}

message CodeModificationRequest {
  string agent_run_id = 1;
  int64 app_id = 2;
  int64 session_id = 3;
  int64 user_id = 4;
  string prompt = 5;
  CodeGenType code_gen_type = 6;
  string workspace_path = 7;
  int64 model_config_id = 8;
  int32 config_version = 9;
  string original_content = 10;
  string loop_state_json = 11;
  bool is_test = 12;
  GenerationMode generation_mode = 13;
}

message CodeGenerationEvent {
  string agent_run_id = 1;
  int64 seq = 2;
  EventType event_type = 3;
  string agent_name = 10;  // 标识发出此事件的 Agent 名称
  oneof payload {
    AiResponseData ai_response = 4;
    ToolRequestData tool_request = 5;
    ToolExecutedData tool_executed = 6;
    ErrorData error = 7;
    DoneData done = 8;
    StatusData status = 9;
  }
}

message ValidatePromptRequest {
  string prompt = 1;
}

message ValidatePromptResponse {
  bool valid = 1;
  string reason = 2;
}

message EnhancePromptRequest {
  string prompt = 1;
  int64 model_config_id = 2;
  int32 config_version = 3;
}

message EnhancePromptResponse {
  bool success = 1;
  string enhanced_prompt = 2;
  string error_message = 3;
}

message GenerateAppTitleRequest {
  string init_prompt = 1;
  int64 model_config_id = 2;
  int32 config_version = 3;
}

message GenerateSessionTitleRequest {
  string app_name = 1;
  string app_init_prompt = 2;
  string first_user_message = 3;
  int64 model_config_id = 4;
  int32 config_version = 5;
}

message GenerateTitleResponse {
  bool success = 1;
  string title = 2;
  string error_message = 3;
}
